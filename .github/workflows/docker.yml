name: Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: respawn-io

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (PR validation)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Create Deployment PR
    runs-on: ubuntu-latest
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Checkout homelab repository
        uses: actions/checkout@v4
        with:
          repository: natikgadzhi/homelab
          token: ${{ secrets.HOMELAB_PAT }}
          path: homelab

      - name: Update image tag in kustomization
        run: |
          cd homelab
          sed -i 's/newTag: .*/newTag: ${{ steps.sha.outputs.short }}/' k8s/apps/respawn-io/overlays/host01/kustomization.yaml

      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMELAB_PAT }}
          path: homelab
          branch: deploy/respawn-io
          title: "Deploy respawn-io ${{ steps.sha.outputs.short }}"
          body: |
            Automated deployment PR for respawn-io.

            - Image tag: `${{ steps.sha.outputs.short }}`
            - Source commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}

            Triggered by: ${{ github.event.head_commit.message }}
          commit-message: "chore: update respawn-io to ${{ steps.sha.outputs.short }}"
          delete-branch: true
          update-pull-request-title-and-body: true
