name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build site
        run: pnpm run build
        env:
          NODE_ENV: production

      # Pushes to main deploy to production; same-repo PRs get a preview
      # deployment on a per-branch URL. Fork PRs are skipped (no secrets).
      - name: Deploy to Cloudflare Pages
        id: deploy
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/ --project-name=respawn-io --branch=${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request' && steps.deploy.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.deployment-url }}";
            const alias = "${{ steps.deploy.outputs.pages-deployment-alias-url }}";
            const marker = "<!-- cloudflare-pages-preview -->";
            const body = `${marker}\n**Cloudflare Pages preview:** ${alias || url}\n\nLatest deployment: ${url}`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
